<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame - Grand Dining Room</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      :root {
        --ink: #2b1d16;
        --ivory: #f4ecde;
        --gold: #c9a454;
        --burgundy: #5a1f24;
        --oak: #5d3a25;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(
          circle at 20% 10%,
          #fff3db 0%,
          #e5cda2 26%,
          #7a5538 72%,
          #2f1c13 100%
        );
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 9;
        max-width: min(90vw, 420px);
        color: var(--ivory);
        background: linear-gradient(
          135deg,
          rgb(40 20 14 / 85%),
          rgb(86 29 35 / 82%)
        );
        border: 1px solid rgb(201 164 84 / 70%);
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: 0 10px 30px rgb(0 0 0 / 35%);
        backdrop-filter: blur(4px);
      }

      #hud h1 {
        margin: 0 0 6px;
        font-size: clamp(15px, 2.2vw, 20px);
        letter-spacing: 0.06em;
        color: #ffde94;
      }

      #hud p {
        margin: 0;
        font-size: clamp(12px, 1.8vw, 14px);
        line-height: 1.45;
      }
    </style>
  </head>

    <div id="hud">
      <h1>Grand Dining Room</h1>
      <p>
        Move with WASD or arrow keys. Look around with mouse or touch drag. Your
        dining set remains fully interactive and model-free. Tonight: signature
        gala atmosphere.
      </p>
    </div>
