<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame - Dining Room</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      :root {
        --ink: #0a0a14;
        --ivory: #f0f4f8;
        --accent: #3b82f6;
        --navy: #1e3a5f;
        --dark: #1a1a2a;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(
          circle at 20% 10%,
          #1a2a4a 0%,
          #0f1a2f 40%,
          #070b14 100%
        );
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 9;
        max-width: min(90vw, 420px);
        color: var(--ivory);
        background: linear-gradient(
          135deg,
          rgb(10 10 20 / 88%),
          rgb(30 58 95 / 85%)
        );
        border: 1px solid rgb(59 130 246 / 60%);
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: 0 10px 30px rgb(0 0 0 / 45%);
        backdrop-filter: blur(4px);
      }

      #hud h1 {
        margin: 0 0 6px;
        font-size: clamp(15px, 2.2vw, 20px);
        letter-spacing: 0.06em;
        color: #93c5fd;
      }

      #hud p {
        margin: 0;
        font-size: clamp(12px, 1.8vw, 14px);
        line-height: 1.45;
      }

      .a-enter-vr {
        display: none !important;
      }

      #controls-panel {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      #controls-panel button {
        padding: 8px 14px;
        font-size: 13px;
        border: 1px solid rgba(59, 130, 246, 0.6);
        border-radius: 8px;
        background: rgba(10, 10, 20, 0.88);
        color: #93c5fd;
        cursor: pointer;
        font-family: inherit;
        backdrop-filter: blur(4px);
        transition: background 0.2s;
      }
      #controls-panel button:hover {
        background: rgba(30, 58, 95, 0.9);
      }

      #status-bar {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        color: #93c5fd;
        font-size: 14px;
        font-family: inherit;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }
      #interact-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 24px);
        z-index: 10;
        color: #93c5fd;
        font-size: 13px;
        font-family: inherit;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        margin: -6px 0 0 -6px;
        border: 2px solid rgba(59, 130, 246, 0.6);
        border-radius: 50%;
        z-index: 10;
        pointer-events: none;
      }
      #photo-flash {
        position: fixed;
        inset: 0;
        background: white;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
      }
      .tp-marker {
        cursor: pointer;
      }
    </style>

    <script>
      /* ========== A-Frame Custom Components ========== */

      /* Window toggle — click glass to swing open / closed */
      AFRAME.registerComponent("window-toggle", {
        schema: { side: { type: "string", default: "left" } },
        init: function () {
          this.open = false;
          var self = this;
          var dir = this.data.side === "left" ? 1 : -1;
          this.el.addEventListener("click", function () {
            self.open = !self.open;
            if (self.open) {
              self.el.setAttribute("animation__win", {
                property: "rotation",
                to: "0 " + 75 * dir + " 0",
                dur: 600,
                easing: "easeOutQuad",
              });
              updateStatus("\u{1FA9F} Window opened — feel the storm!");
            } else {
              self.el.setAttribute("animation__win", {
                property: "rotation",
                to: "0 0 0",
                dur: 500,
                easing: "easeInQuad",
              });
              updateStatus("\u{1FA9F} Window closed.");
            }
            playClickSound();
          });
          this.el.addEventListener("mouseenter", function () {
            var h = document.getElementById("interact-hint");
            if (h)
              h.textContent = self.open
                ? "\u{1FA9F} Click to close window"
                : "\u{1FA9F} Click to open window";
          });
          this.el.addEventListener("mouseleave", function () {
            var h = document.getElementById("interact-hint");
            if (h) h.textContent = "";
          });
        },
      });

      /* Boundary check — keeps player inside room */
      AFRAME.registerComponent("boundary-check", {
        schema: { enabled: { default: true } },
        tick: function () {
          if (!this.data.enabled) return;
          var p = this.el.object3D.position;
          p.x = Math.max(-8.2, Math.min(8.2, p.x));
          p.z = Math.max(-9.2, Math.min(1.5, p.z));
        },
      });

      /* Door toggle — click to open/close front door with smart boundary */
      AFRAME.registerComponent("door-toggle", {
        init: function () {
          this.open = false;
          var self = this;
          var el = this.el;
          var hint = document.getElementById("interact-hint");
          el.addEventListener("click", function () {
            var rig = document.getElementById("rig");
            var playerZ = rig.object3D.position.z;
            self.open = !self.open;
            if (self.open) {
              el.setAttribute(
                "animation__door",
                "property: rotation; to: 0 -100 0; dur: 600; easing: easeInOutQuad",
              );
              rig.setAttribute("boundary-check", "enabled: false");
              if (typeof updateStatus === "function")
                updateStatus("\uD83D\uDEAA Door opened");
            } else {
              el.setAttribute(
                "animation__door",
                "property: rotation; to: 0 0 0; dur: 600; easing: easeInOutQuad",
              );
              if (playerZ < 2.5) {
                rig.setAttribute("boundary-check", "enabled: true");
                if (typeof updateStatus === "function")
                  updateStatus("\uD83D\uDEAA Door closed \u2014 inside room");
              } else {
                rig.setAttribute("boundary-check", "enabled: false");
                if (typeof updateStatus === "function")
                  updateStatus("\uD83D\uDEAA Door closed \u2014 free roam!");
              }
            }
            if (typeof playClickSound === "function") playClickSound();
            if (typeof playWhoosh === "function") playWhoosh();
          });
          el.addEventListener("mouseenter", function () {
            if (hint)
              hint.textContent =
                "\uD83D\uDEAA Click to " +
                (self.open ? "close" : "open") +
                " door";
          });
          el.addEventListener("mouseleave", function () {
            if (hint) hint.textContent = "";
          });
        },
      });

      /* Hover glow — emissive highlight on mouse enter */
      AFRAME.registerComponent("hover-glow", {
        init: function () {
          var el = this.el;
          var hint = document.getElementById("interact-hint");
          el.addEventListener("mouseenter", function () {
            el.setAttribute("material", "emissive", "#554422");
            el.setAttribute("material", "emissiveIntensity", 0.35);
            if (hint) hint.textContent = "\u{1F5B1} Click to interact";
          });
          el.addEventListener("mouseleave", function () {
            el.setAttribute("material", "emissive", "#000");
            el.setAttribute("material", "emissiveIntensity", 0);
            if (hint) hint.textContent = "";
          });
        },
      });

      /* Grabbable — click to lift item, click again to place back */
      AFRAME.registerComponent("grabbable", {
        schema: { liftHeight: { type: "number", default: 0.3 } },
        init: function () {
          this.held = false;
          this.origY = null;
          var self = this;
          this.el.addEventListener("click", function () {
            var pos = self.el.getAttribute("position");
            if (!self.held) {
              self.origY = pos.y;
              self.el.setAttribute("animation__grab", {
                property: "position",
                to: pos.x + " " + (pos.y + self.data.liftHeight) + " " + pos.z,
                dur: 300,
                easing: "easeOutQuad",
              });
              self.el.setAttribute("animation__spin", {
                property: "rotation",
                to: "0 360 0",
                dur: 1500,
                loop: true,
                easing: "linear",
              });
              self.held = true;
              updateStatus("Picked up " + (self.el.id || "item") + "!");
              playClickSound();
            } else {
              self.el.setAttribute("animation__grab", {
                property: "position",
                to: pos.x + " " + self.origY + " " + pos.z,
                dur: 300,
                easing: "easeInQuad",
              });
              self.el.removeAttribute("animation__spin");
              self.el.setAttribute("rotation", "0 0 0");
              self.held = false;
              updateStatus("Placed " + (self.el.id || "item") + " back down.");
              playClickSound();
            }
          });
        },
      });

      /* Teleport point — click to move rig */
      AFRAME.registerComponent("teleport-point", {
        schema: {
          targetX: { type: "number", default: 0 },
          targetZ: { type: "number", default: 0 },
        },
        init: function () {
          var data = this.data;
          this.el.addEventListener("click", function () {
            var rig = document.getElementById("rig");
            rig.setAttribute("position", data.targetX + " 0 " + data.targetZ);
            updateStatus("\u26A1 Teleported!");
            playWhoosh();
          });
          this.el.addEventListener("mouseenter", function () {
            var h = document.getElementById("interact-hint");
            if (h) h.textContent = "\u26A1 Click to teleport";
          });
          this.el.addEventListener("mouseleave", function () {
            var h = document.getElementById("interact-hint");
            if (h) h.textContent = "";
          });
        },
      });

      /* Steam particles — spawns tiny rising, fading spheres */
      AFRAME.registerComponent("steam-effect", {
        init: function () {
          this.particles = [];
          this.timer = 0;
        },
        tick: function (t, dt) {
          this.timer += dt;
          if (this.timer > 350) {
            this.timer = 0;
            this.spawn();
          }
          var self = this;
          this.particles = this.particles.filter(function (p) {
            p.age += dt;
            if (p.age > 2200) {
              p.el.parentNode.removeChild(p.el);
              return false;
            }
            var prog = p.age / 2200;
            p.el.object3D.position.y += 0.0012;
            p.el.setAttribute("material", "opacity", 0.28 * (1 - prog));
            return true;
          });
        },
        spawn: function () {
          var s = document.createElement("a-sphere");
          var xo = (Math.random() - 0.5) * 0.04;
          var zo = (Math.random() - 0.5) * 0.04;
          s.setAttribute("position", xo + " 0 " + zo);
          s.setAttribute("radius", "0.012");
          s.setAttribute("color", "#ffffff");
          s.setAttribute("material", "opacity: 0.28; transparent: true");
          this.el.appendChild(s);
          this.particles.push({ el: s, age: 0 });
        },
      });

      /* Rain system — falling droplets in a volume */
      AFRAME.registerComponent("rain-system", {
        schema: {
          count: { type: "number", default: 220 },
          width: { type: "number", default: 16 },
          depth: { type: "number", default: 10 },
          height: { type: "number", default: 8 },
          speed: { type: "number", default: 8 },
        },
        init: function () {
          this.drops = [];
          var d = this.data;
          for (var i = 0; i < d.count; i++) {
            var drop = document.createElement("a-entity");
            drop.setAttribute(
              "geometry",
              "primitive: cylinder; radius: 0.012; height: 0.22",
            );
            drop.setAttribute(
              "material",
              "color: #aaccee; opacity: 0.45; transparent: true",
            );
            var x = (Math.random() - 0.5) * d.width;
            var y = Math.random() * d.height;
            var z = (Math.random() - 0.5) * d.depth;
            drop.setAttribute("position", x + " " + y + " " + z);
            this.el.appendChild(drop);
            this.drops.push({
              el: drop,
              speed: d.speed * (0.8 + Math.random() * 0.4),
            });
          }
        },
        tick: function (t, dt) {
          var sec = dt / 1000;
          var h = this.data.height;
          for (var i = 0; i < this.drops.length; i++) {
            var p = this.drops[i].el.object3D.position;
            p.y -= this.drops[i].speed * sec;
            if (p.y < -0.5) {
              p.y = h;
              p.x = (Math.random() - 0.5) * this.data.width;
              p.z = (Math.random() - 0.5) * this.data.depth;
            }
          }
        },
      });

      /* Lightning flash — periodic bright flash on the outdoor scene */
      AFRAME.registerComponent("lightning-flash", {
        init: function () {
          this.timer = 0;
          this.nextFlash = 4000 + Math.random() * 8000;
        },
        tick: function (t, dt) {
          this.timer += dt;
          if (this.timer > this.nextFlash) {
            this.timer = 0;
            this.nextFlash = 3000 + Math.random() * 10000;
            this.flash();
          }
        },
        flash: function () {
          var el = this.el;
          el.setAttribute("light", "intensity", 6);
          playThunder();
          /* Camera shake on thunder */
          var cam = document.getElementById("camera");
          if (cam) {
            cam.setAttribute("animation__shake", {
              property: "position",
              from: "0 1.66 0.02",
              to: "0 1.60 -0.02",
              dur: 80,
              dir: "alternate",
              loop: 4,
              easing: "easeInOutSine",
            });
            setTimeout(function () {
              cam.removeAttribute("animation__shake");
              cam.setAttribute("position", "0 1.63 0");
            }, 500);
          }
          setTimeout(function () {
            el.setAttribute("light", "intensity", 0);
          }, 80);
          setTimeout(function () {
            el.setAttribute("light", "intensity", 4);
          }, 160);
          setTimeout(function () {
            el.setAttribute("light", "intensity", 0);
          }, 220);
        },
      });

      /* Tree sway — gentle wind sway animation for outdoor trees */
      AFRAME.registerComponent("tree-sway", {
        schema: {
          amount: { type: "number", default: 3 },
          speed: { type: "number", default: 2000 },
        },
        init: function () {
          var a = this.data.amount;
          var d = this.data.speed + Math.random() * 1000;
          this.el.setAttribute("animation__sway", {
            property: "rotation",
            from: "0 0 " + -a,
            to: "0 0 " + a,
            dur: d,
            dir: "alternate",
            loop: true,
            easing: "easeInOutSine",
          });
        },
      });

      /* Easter egg — click crystal 5 times for a surprise */
      AFRAME.registerComponent("easter-egg", {
        init: function () {
          this.clicks = 0;
          var self = this;
          this.el.addEventListener("click", function () {
            self.clicks++;
            if (self.clicks >= 5) {
              self.activate();
              self.clicks = 0;
            }
          });
        },
        activate: function () {
          updateStatus("\u{1F389} Easter Egg! You found the secret!");
          var sky = document.querySelector("a-sky");
          var cols = [
            "#ff0000",
            "#ff8800",
            "#ffff00",
            "#00ff00",
            "#0088ff",
            "#8800ff",
          ];
          var orig = sky.getAttribute("color");
          var i = 0;
          var iv = setInterval(function () {
            sky.setAttribute("color", cols[i % cols.length]);
            i++;
            if (i > 18) {
              clearInterval(iv);
              sky.setAttribute("color", orig);
            }
          }, 140);
          playEasterEgg();
        },
      });

      /* Dust motes — floating golden particles in the room */
      AFRAME.registerComponent("dust-motes", {
        init: function () {
          this.motes = [];
          for (var i = 0; i < 35; i++) {
            var m = document.createElement("a-sphere");
            var x = (Math.random() - 0.5) * 14;
            var y = 0.5 + Math.random() * 3;
            var z = -1 + Math.random() * -8;
            m.setAttribute("position", x + " " + y + " " + z);
            m.setAttribute("radius", "0.008");
            m.setAttribute("color", "#93c5fd");
            m.setAttribute(
              "material",
              "emissive:#93c5fd; emissiveIntensity:0.6; opacity:0.45; transparent:true",
            );
            this.el.appendChild(m);
            this.motes.push({
              el: m,
              ox: x,
              oy: y,
              oz: z,
              sx: 0.2 + Math.random() * 0.4,
              sy: 0.15 + Math.random() * 0.25,
              sz: 0.18 + Math.random() * 0.35,
              ph: Math.random() * Math.PI * 2,
            });
          }
        },
        tick: function (t) {
          var s = t / 1000;
          for (var i = 0; i < this.motes.length; i++) {
            var m = this.motes[i];
            var p = m.el.object3D.position;
            p.x = m.ox + Math.sin(s * m.sx + m.ph) * 0.3;
            p.y = m.oy + Math.sin(s * m.sy + m.ph * 2) * 0.15;
            p.z = m.oz + Math.cos(s * m.sz + m.ph) * 0.2;
          }
        },
      });

      /* Pendulum — swinging clock pendulum */
      AFRAME.registerComponent("pendulum", {
        schema: {
          speed: { type: "number", default: 2000 },
          angle: { type: "number", default: 15 },
        },
        init: function () {
          this.el.setAttribute("animation__swing", {
            property: "rotation",
            from: "0 0 " + -this.data.angle,
            to: "0 0 " + this.data.angle,
            dur: this.data.speed,
            dir: "alternate",
            loop: true,
            easing: "easeInOutSine",
          });
        },
      });

      /* ========== Audio System (Web Audio API — no external files) ========== */
      var audioCtx;
      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playClickSound() {
        try {
          var c = getAudioCtx(),
            o = c.createOscillator(),
            g = c.createGain();
          o.connect(g);
          g.connect(c.destination);
          o.frequency.setValueAtTime(800, c.currentTime);
          o.frequency.exponentialRampToValueAtTime(400, c.currentTime + 0.1);
          g.gain.setValueAtTime(0.15, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
          o.start(c.currentTime);
          o.stop(c.currentTime + 0.15);
        } catch (e) {}
      }

      function playWhoosh() {
        try {
          var c = getAudioCtx(),
            len = c.sampleRate * 0.3;
          var buf = c.createBuffer(1, len, c.sampleRate),
            d = buf.getChannelData(0);
          for (var i = 0; i < len; i++)
            d[i] = (Math.random() * 2 - 1) * (1 - i / len);
          var src = c.createBufferSource();
          src.buffer = buf;
          var g = c.createGain();
          g.gain.setValueAtTime(0.18, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
          var f = c.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.setValueAtTime(1000, c.currentTime);
          f.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.3);
          src.connect(f);
          f.connect(g);
          g.connect(c.destination);
          src.start();
        } catch (e) {}
      }

      function playEasterEgg() {
        try {
          var c = getAudioCtx(),
            notes = [523, 659, 784, 1047, 784, 659, 523];
          notes.forEach(function (freq, i) {
            var o = c.createOscillator(),
              g = c.createGain();
            o.connect(g);
            g.connect(c.destination);
            o.frequency.value = freq;
            o.type = "triangle";
            g.gain.setValueAtTime(0.12, c.currentTime + i * 0.12);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              c.currentTime + i * 0.12 + 0.11,
            );
            o.start(c.currentTime + i * 0.12);
            o.stop(c.currentTime + i * 0.12 + 0.12);
          });
        } catch (e) {}
      }

      function playThunder() {
        try {
          var c = getAudioCtx();
          var len = c.sampleRate * 1.8;
          var buf = c.createBuffer(1, len, c.sampleRate);
          var d = buf.getChannelData(0);
          for (var i = 0; i < len; i++) {
            var env = Math.exp(-i / (c.sampleRate * 0.6));
            d[i] = (Math.random() * 2 - 1) * env;
          }
          var src = c.createBufferSource();
          src.buffer = buf;
          var g = c.createGain();
          g.gain.setValueAtTime(0.25, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 1.8);
          var lp = c.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.value = 300;
          src.connect(lp);
          lp.connect(g);
          g.connect(c.destination);
          src.start();
        } catch (e) {}
      }

      var rainNode = null;
      function startRainAudio() {
        if (rainNode) return;
        try {
          var c = getAudioCtx();
          var len = c.sampleRate * 2;
          var buf = c.createBuffer(1, len, c.sampleRate);
          var d = buf.getChannelData(0);
          for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
          rainNode = c.createBufferSource();
          rainNode.buffer = buf;
          rainNode.loop = true;
          var g = c.createGain();
          g.gain.value = 0.045;
          var bp = c.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = 800;
          bp.Q.value = 0.5;
          rainNode.connect(bp);
          bp.connect(g);
          g.connect(c.destination);
          rainNode.start();
        } catch (e) {}
      }

      function playFootstep() {
        try {
          var c = getAudioCtx(),
            o = c.createOscillator(),
            g = c.createGain();
          o.connect(g);
          g.connect(c.destination);
          o.frequency.value = 80 + Math.random() * 40;
          o.type = "sine";
          g.gain.setValueAtTime(0.06, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
          o.start(c.currentTime);
          o.stop(c.currentTime + 0.08);
        } catch (e) {}
      }

      /* Ambient room drone — started on first user gesture */
      var ambienceStarted = false;
      function startAmbience() {
        if (ambienceStarted) return;
        ambienceStarted = true;
        try {
          var c = getAudioCtx();
          var o = c.createOscillator();
          o.type = "sine";
          o.frequency.value = 60;
          var g = c.createGain();
          g.gain.value = 0.018;
          o.connect(g);
          g.connect(c.destination);
          o.start();
          var len = c.sampleRate * 2,
            buf = c.createBuffer(1, len, c.sampleRate);
          var d = buf.getChannelData(0);
          for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
          var n = c.createBufferSource();
          n.buffer = buf;
          n.loop = true;
          var ng = c.createGain();
          ng.gain.value = 0.006;
          var lp = c.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.value = 180;
          n.connect(lp);
          lp.connect(ng);
          ng.connect(c.destination);
          n.start();
        } catch (e) {}
      }
      /* Fireplace crackling audio — random micro-pops */
      var crackleInterval = null;
      function startFireCrackle() {
        if (crackleInterval) return;
        crackleInterval = setInterval(
          function () {
            try {
              var c = getAudioCtx();
              var len = Math.floor(
                c.sampleRate * (0.02 + Math.random() * 0.05),
              );
              var buf = c.createBuffer(1, len, c.sampleRate);
              var d = buf.getChannelData(0);
              for (var i = 0; i < len; i++)
                d[i] = (Math.random() * 2 - 1) * Math.exp((-i / len) * 3);
              var src = c.createBufferSource();
              src.buffer = buf;
              var g = c.createGain();
              g.gain.value = 0.02 + Math.random() * 0.03;
              var hp = c.createBiquadFilter();
              hp.type = "highpass";
              hp.frequency.value = 900;
              src.connect(hp);
              hp.connect(g);
              g.connect(c.destination);
              src.start();
            } catch (e) {}
          },
          150 + Math.floor(Math.random() * 280),
        );
      }

      document.addEventListener(
        "click",
        function () {
          startAmbience();
          startRainAudio();
          startFireCrackle();
        },
        { once: true },
      );
      document.addEventListener(
        "keydown",
        function () {
          startAmbience();
          startRainAudio();
          startFireCrackle();
        },
        { once: true },
      );

      /* ========== Status / Day-Night / Photo / Reset ========== */
      function updateStatus(msg) {
        var el = document.getElementById("status-text");
        if (!el) return;
        el.textContent = msg;
        clearTimeout(el._t);
        el._t = setTimeout(function () {
          el.textContent = "";
        }, 3500);
      }

      var isDayMode = false;
      function toggleDayNight() {
        isDayMode = !isDayMode;
        var sky = document.querySelector("a-sky");
        var scene = document.querySelector("a-scene");
        var btn = document.getElementById("day-night-btn");
        if (isDayMode) {
          sky.setAttribute("color", "#87ceeb");
          scene.setAttribute(
            "fog",
            "type: exponential; color: #c8dff0; density: 0.006",
          );
          if (btn) btn.textContent = "\u{1F319} Night";
        } else {
          sky.setAttribute("color", "#0a0a14");
          scene.setAttribute(
            "fog",
            "type: exponential; color: #0a0a14; density: 0.022",
          );
          if (btn) btn.textContent = "\u2600\uFE0F Day";
        }
        playClickSound();
      }

      function resetScene() {
        document.getElementById("rig").setAttribute("position", "0 0 2");
        updateStatus("Scene reset!");
        playClickSound();
      }

      var photoMode = false;
      function togglePhotoMode() {
        photoMode = !photoMode;
        var hud = document.getElementById("hud");
        var cp = document.getElementById("controls-panel");
        var ch = document.getElementById("crosshair");
        var flash = document.getElementById("photo-flash");
        if (photoMode) {
          if (hud) hud.style.display = "none";
          if (cp) cp.style.display = "none";
          if (ch) ch.style.display = "none";
          if (flash) {
            flash.style.opacity = "1";
            setTimeout(function () {
              flash.style.opacity = "0";
            }, 200);
          }
          updateStatus("\u{1F4F8} Photo Mode — press P to exit");
        } else {
          if (hud) hud.style.display = "block";
          if (cp) cp.style.display = "flex";
          if (ch) ch.style.display = "block";
        }
      }

      /* Keyboard shortcuts */
      document.addEventListener("keydown", function (e) {
        if (e.key === "p" || e.key === "P") togglePhotoMode();
        if (e.key === "n" || e.key === "N") toggleDayNight();
        if (
          (e.key === "r" || e.key === "R") &&
          document.activeElement.tagName !== "INPUT"
        )
          resetScene();
      });

      /* Footstep tracking */
      var lastRigPos = { x: 0, z: 0 };
      setInterval(function () {
        var rig = document.getElementById("rig");
        if (!rig) return;
        var pos = rig.getAttribute("position");
        if (!pos) return;
        var dx = pos.x - lastRigPos.x,
          dz = pos.z - lastRigPos.z;
        if (Math.sqrt(dx * dx + dz * dz) > 0.08) playFootstep();
        lastRigPos.x = pos.x;
        lastRigPos.z = pos.z;
      }, 350);

      /* Auto-apply hover-glow and grabbable on scene load */
      document.addEventListener("DOMContentLoaded", function () {
        var scene = document.querySelector("a-scene");
        scene.addEventListener("loaded", function () {
          document.querySelectorAll(".interactable").forEach(function (el) {
            el.setAttribute("hover-glow", "");
          });
          var milo = document.getElementById("milo");
          var milk = document.getElementById("milk");
          if (milo) milo.setAttribute("grabbable", "");
          if (milk) milk.setAttribute("grabbable", "");
        });
      });
    </script>
